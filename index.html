<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>this is cool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="titleSection" data-color="#5F0096">
        <h1 class="hero-text" id="random">loading...</h1>
    </section>
    
    <section data-color="#007D06">
        <p> <strong> I am Arlo. </strong> <br> this is a paragraph <br> wow <br> even cooler </p>
    </section>
    
    <script>
        const sections = document.querySelectorAll('section');

        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const newColor = entry.target.getAttribute('data-color');
              document.body.style.backgroundColor = newColor;
            }
          });
        }, {
          threshold: 1
        });

        sections.forEach(section => observer.observe(section));
    </script>
    
    <script>
        const textOptions = [
            "welcome",
            "hello",
            "hi",
            "sup",
            "hiiiiiiiii"
        ]
        const fontOptions = [
            "Courier New",
            "Times New Roman",
            "Arial",
            "Brush Script MT",
            "Verdana"
        ]
        function randomText() {
            const randomIndex = Math.floor(Math.random() * textOptions.length);
            document.getElementById("random").innerText = textOptions[randomIndex];
            const randomFont = Math.floor(Math.random() * fontOptions.length);
            document.getElementById("random").style.fontFamily = fontOptions[randomFont];
        }
        window.onload = randomText;
    </script>
</body>
</html>
