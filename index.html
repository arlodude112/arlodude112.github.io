<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>this is cool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section data-color=>
        <h1 class="hero-text" id="random">loading...</h1>
    </sectiob>
    
    <script>
        const textOptions = [
            "welcome",
            "hello",
            "hi",
            "sup",
            "hiiiiiiiii"
        ]
        function randomText() {
            const randomIndex = Math.floor(Math.random() * textOptions.length);
            document.getElementById("random").innerText = textOptions[randomIndex];
        }
        window.onload = randomText;
    </script>
    
    <p>cool</p>
</body>
</html>
