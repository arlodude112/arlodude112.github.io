<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arlo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="titleSection" data-color="#573b5c">
        <h1 class="hero-text" id="random">loading...</h1>
    </section>
    
    <section data-color="#525c50" class="split-section">
        <div class="fade">
            <strong> I am Arlo. </strong> <br> 
            I like to make games sometimes, <br> 
            and also play them. <br> 
            this is a website i made
        </div>

        <div class="box">
            <h3>Phrase of the Day</h3>
            <p id="phrase-text">Loading phrase from Discord...</p>
        </div>
    </section>
    
    <script>
        const sections = document.querySelectorAll('section');

        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const newColor = entry.target.getAttribute('data-color');
              document.body.style.backgroundColor = newColor;
            }
          });
        }, {
          threshold: 1
        });

        sections.forEach(section => observer.observe(section));
    </script>
    
    <script>
        const textOptions = ["welcome", "hello", "hi"];
        const fontOptions = [
            "Courier New",
            "Times New Roman",
            "Arial",
            "Brush Script MT",
            "Verdana"
        ];

        function randomText() {
            const randomIndex = Math.floor(Math.random() * textOptions.length);
            document.getElementById("random").innerText = textOptions[randomIndex];
            
            const randomFont = Math.floor(Math.random() * fontOptions.length);
            document.getElementById("random").style.fontFamily = fontOptions[randomFont];
        }

        async function loadPhrase() {
            try {
                const response = await fetch("https://long-math-1f72.arlodude112.workers.dev/");
                const potd = await response.json();
        
                document.getElementById("phrase-text").innerText = potd.latestMessage;
            } catch (error) {
                document.getElementById("phrase-text").innerText = "Could not load phrase today!";
                console.error("Fetch error:", error);
            }
        }

        window.onload = function() {
            randomText();
            loadPhrase();
        };
    </script>
</body>
</html>
